spring.application.name=ctink

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jackson.property-naming-strategy=SNAKE_CASE

# db
spring.datasource.url = jdbc:mysql://mysql:3306/ctink
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# mq
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
#spring.rabbitmq.username=admin
#spring.rabbitmq.password=StrongPassword123!

# apply
snort.rule.path=/app/rules/local.rules
yara.rule.path=/app/rules/yara/ctink_rules.yar